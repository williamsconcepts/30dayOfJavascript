<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Console Tricks!</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>

  <p onClick="makeGreen()">×BREAK×DOWN×</p>

  <script>
    const dogs = [{ name: 'Snickers', age: 2 }, { name: 'hugo', age: 8 }];

    function makeGreen() {
      const p = document.querySelector('p');
      p.style.color = '#BADA55';
      p.style.fontSize = '50px';
    }

    // Regular
console.log('hello')
    // Interpolated
console.log('hello i am a %s string!', 'cool')
    // Styled
console.log('hello %c world', 'color: tomato; font-size: 20px;')

    // warning!
 console.warn('OH NOOOO!')
    // Error :|
 console.error('OH NOOOO!')
    // Info
 console.info('OH NOOOO!')

    // Testing
 console.assert(false, 'OH NOOOO!')
    // clearing
 console.clear()
    // Viewing DOM Elements
 console.log()
  console.dir()
    // Grouping together
dogs.forEach(dog => {
      console.groupCollapsed(`${dog.name}`)
      console.log(`This is ${dog.name}`)
      console.log(`${dog.name} is ${dog.age} years old`)
      console.log(`${dog.name} is ${dog.age * 7} dog years old`)
      console.groupEnd(`${dog.name}`)
    })
    // counting
console.count('ebube')
console.count('ebube')
console.count('ebube')
console.count('ebube')
console.count('ebube')
console.count('steve')
console.count('ebube')
console.count('ebube')
console.count('stres')

    // timing
console.time('fetching data')
fetch('https://api.github.com/users/williamsconcepts')
  .then(data => data.json())
  .then(data => {
    console.timeEnd('fetching data')
    console.log(data)
  });
  console.table(dogs)
  </script>
</body>
</html>
