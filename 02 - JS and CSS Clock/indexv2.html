<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS + CSS Clock</title>
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>

  <body>

    <div class="clock">
      <div class="clock-face">

        <!-- Numbers will appear here -->

        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>

        <div class="center-dot"></div>

      </div>
    </div>


<style>

html {
  background: #018ded url(https://unsplash.it/1500/1000?image=881&blur=5);
  background-size: cover;
  font-family: "helvetica neue";
  text-align: center;
  font-size: 10px;
}


body {
  margin: 0;
  display: flex;
  min-height: 100vh;
  align-items: center;
}


.clock {

  width: 30rem;
  height: 30rem;

  border: 20px solid white;

  border-radius: 50%;

  margin: auto;

  position: relative;

  padding: 2rem;


  box-shadow:
  0 0 0 4px rgba(0,0,0,0.1),
  inset 0 0 0 3px #efefef,
  inset 0 0 10px black,
  0 0 10px rgba(0,0,0,0.2);

}


.clock-face {

  position: relative;

  width:100%;
  height:100%;

  transform:translateY(-3px);

}



/* clock numbers */

.number {

  position:absolute;

  width:100%;
  height:100%;

  text-align:center;

  font-size:2.5rem;

  font-weight:bold;

  color:black;

}


.number span {

  display:block;

}



/* hands */

.hand {

  width:50%;

  height:6px;

  background:black;

  position:absolute;

  top:50%;


  transform-origin:100%;

  transform:rotate(90deg);


  transition:all .05s;

  transition-timing-function:cubic-bezier(.1,2.7,.58,1);

}


.hour-hand {

  width:35%;

  left:15%;

}



.min-hand {

  width:45%;

  left:5%;

}



.second-hand {

  height:3px;

  background:red;

}



/* center circle */

.center-dot {

 position:absolute;

 width:18px;

 height:18px;

 background:black;

 border-radius:50%;

 top:50%;

 left:50%;

 transform:translate(-50%,-50%);

}


</style>


<script>


const clockFace = document.querySelector(".clock-face");


/*
 create clock numbers
*/

for(let i = 1; i <= 12; i++){


  const number = document.createElement("div");

  number.classList.add("number");


  number.style.transform = 
  `rotate(${i * 30}deg)`;


  number.innerHTML = 
  `<span style="
  transform:rotate(-${i * 30}deg);
  ">
  ${i}
  </span>`;


  clockFace.appendChild(number);

}



const secondHand = document.querySelector(".second-hand");

const minHand = document.querySelector(".min-hand");

const hourHand = document.querySelector(".hour-hand");



function setDate(){


const now = new Date();



/*
 seconds
*/

const seconds = now.getSeconds();

const secondDegrees = 
((seconds / 60) * 360) + 90;


secondHand.style.transform =
`rotate(${secondDegrees}deg)`;




/*
 minutes
*/

const mins = now.getMinutes();

const minDegrees =
((mins / 60) * 360) + 90;


minHand.style.transform =
`rotate(${minDegrees}deg)`;




/*
 hours
*/

const hours = now.getHours();


const hourDegrees =
((hours % 12) / 12 * 360)
+
((mins/60)*30)
+
90;



hourHand.style.transform =
`rotate(${hourDegrees}deg)`;



}



setInterval(setDate,1000);


setDate();


</script>


</body>
</html>
